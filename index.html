<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurante Solo Bueno JC</title>

    <!-- Bootstrap solo para grillas/layout -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Fonts -->
<link
  href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap"
  rel="stylesheet"
/>


    <!-- Estilos propios -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ENCABEZADO -->
    <header class="sitio-header">
        <div class="container">
            <h1 class="sitio-titulo"> Solo Bueno JC</h1>
            <p class="sitio-subtitulo">El mejor sabor, con los mejores productos, solo bueno</p>
        </div>
    </header>

    <main class="container mt-4">

        <!-- ===================== SECCIÓN 1: MENÚ ===================== -->
        <section id="seccion-menu" aria-labelledby="titulo-menu">
            <h2 id="titulo-menu" class="seccion-titulo">Menú</h2>

            <!-- Botones de filtro por categoría -->
            <div id="contenedor-filtros" class="filtros-menu mb-4" role="group" aria-label="Filtrar por categoría">
                <button class="btn-filtro activo" onclick="filtrarCategoria('Todos')">Todos</button>
                <button class="btn-filtro" onclick="filtrarCategoria('Entrada')">Entradas</button>
                <button class="btn-filtro" onclick="filtrarCategoria('Plato Fuerte')">Platos Fuertes</button>
                <button class="btn-filtro" onclick="filtrarCategoria('Postre')">Postres</button>
            </div>

            <!-- Las cards las genero desde JS con renderMenu() -->
            <div id="contenedor-menu" class="row g-3"></div>
        </section>

        <hr class="separador">

        <!-- ===================== SECCIÓN 2: RESERVAS ===================== -->
        <section id="seccion-reservas" aria-labelledby="titulo-reservas">
            <h2 id="titulo-reservas" class="seccion-titulo">Reservas</h2>

            <div class="row">
                <!-- Formulario -->
                <div class="col-lg-5">
                    <form id="form-reserva" novalidate>

                        <!-- Nombre completo -->
                        <div class="campo-grupo">
                            <label for="nombre" class="campo-label">Nombre completo <span class="requerido">*</span></label>
                            <input type="text" id="nombre" name="nombre" class="campo-input" placeholder="Ej: Joshua Calderon" autocomplete="name">
                            <span id="error-nombre" class="error-campo"></span>
                        </div>

                        <!-- Correo electrónico -->
                        <div class="campo-grupo">
                            <label for="correo" class="campo-label">Correo electrónico <span class="requerido">*</span></label>
                            <input type="email" id="correo" name="correo" class="campo-input" placeholder="ejemplo@correo.com" autocomplete="email">
                            <span id="error-correo" class="error-campo"></span>
                        </div>

                        <!-- Fecha de reserva -->
                        <div class="campo-grupo">
                            <label for="fecha" class="campo-label">Fecha de reserva <span class="requerido">*</span></label>
                            <input type="date" id="fecha" name="fecha" class="campo-input">
                            <span id="error-fecha" class="error-campo"></span>
                        </div>

                        <!-- Hora -->
                        <div class="campo-grupo">
                            <label for="hora" class="campo-label">Hora <span class="requerido">*</span></label>
                            <select id="hora" name="hora" class="campo-input">
                                <option value="">-- Seleccione una hora --</option>
                                <option value="12:00">12:00</option>
                                <option value="13:00">13:00</option>
                                <option value="18:00">18:00</option>
                                <option value="19:00">19:00</option>
                                <option value="20:00">20:00</option>
                            </select>
                            <span id="error-hora" class="error-campo"></span>
                        </div>

                        <!-- Número de personas -->
                        <div class="campo-grupo">
                            <label for="personas" class="campo-label">Número de personas <span class="requerido">*</span></label>
                            <input type="number" id="personas" name="personas" class="campo-input" min="1" max="20" placeholder="Entre 1 y 20">
                            <span id="error-personas" class="error-campo"></span>
                        </div>

                        <!-- Comentarios (opcional) -->
                        <div class="campo-grupo">
                            <label for="comentarios" class="campo-label">Comentarios <span class="opcional">(opcional)</span></label>
                            <textarea id="comentarios" name="comentarios" class="campo-input" rows="3" placeholder="Comentanos"></textarea>
                        </div>

                        <!-- Botón de envío (deshabilitado hasta que el formulario sea válido) -->
                        <button type="submit" id="btn-enviar" class="btn-enviar" disabled>
                            Confirmar Reserva
                        </button>

                    </form>
                </div>

                <!-- Tabla de reservas -->
                <div class="col-lg-7">
                    <h3 class="subtitulo-tabla">Reservas Registradas</h3>

                    <div class="tabla-contenedor">
                        <table id="tabla-reservas" class="tabla-reservas">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Correo</th>
                                    <th>Fecha</th>
                                    <th>Hora</th>
                                    <th>Personas</th>
                                </tr>
                            </thead>
                            <tbody id="cuerpo-tabla">
                                
                            </tbody>
                        </table>
                    </div>

                    <!-- Resumen dinamico — actualizado con actualizarResumen() -->
                    <div id="resumen" class="resumen-reservas" aria-live="polite">
                        <p class="resumen-vacio">Aún no hay reservas registradas.</p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- PIE DE PÁGINA -->
    <footer class="sitio-footer">
        <div class="container">
            <p>© 2026 Solo Bueno JC — Las mejores mejor comida con productos frescos</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

   
    <script src="js/app.js"></script>

</body>
</html>
